name: contract tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rest-contract:
    name: REST (Schemathesis)
    runs-on: ubuntu-latest

    # note: needs a running orders-api to hit. swap in your own image,
    # or run schemathesis against a deployed staging url instead.
    services:
      orders-api:
        image: ghcr.io/example/orders-api:latest
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health || exit 1"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: pip install -r requirements.txt

      - name: run schemathesis
        run: |
          schemathesis run rest/openapi.yaml \
            --base-url http://localhost:8080 \
            --checks all \
            --report rest-report.txt

      - name: upload schemathesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: rest-report.txt

  grpc-contract:
    name: gRPC proto contract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: pip install -r requirements.txt

      - name: compile proto stubs
        run: |
          cd grpc
          python -m grpc_tools.protoc \
            -I. \
            --python_out=. \
            --grpc_python_out=. \
            order.proto

      - name: run proto contract tests
        run: |
          cd grpc && pytest test_proto_contract.py -v --tb=short
